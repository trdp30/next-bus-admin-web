version: '3.8'

services:
  app:
    container_name: admin-next-bus
    image: trdp/next-bus-admin:latest
    ports:
      - "80:80"
    environment:
      - NODE_ENV=production
      - BUILD_ENV=prod
      - FIREBASE_API_DOMAIN=${FIREBASE_API_DOMAIN}
      - FIREBASE_API_KEY=/run/secrets/firebase_api_key
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}
      - FIREBASE_MESSAGING_SENDER_ID=${FIREBASE_MESSAGING_SENDER_ID}
      - FIREBASE_APP_ID=${FIREBASE_APP_ID}
      - FIREBASE_MEASUREMENT_ID=${FIREBASE_MEASUREMENT_ID}
      - GOOGLE_MAPS_API_KEY=/run/secrets/google_maps_api_key
      - REST_API_ROOT=${REST_API_ROOT}
      - REST_API_VERSION=${REST_API_VERSION}
      - GOOGLE_PLACE_API_ROOT=${GOOGLE_PLACE_API_ROOT}
    deploy:
      resources:
        limits:
          cpus: '0.50'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    secrets:
      - firebase_api_key

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

secrets:
  firebase_api_key:
    file: ./secrets/firebase_api_key.txt
